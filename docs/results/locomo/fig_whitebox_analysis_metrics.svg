  <text x="60" y="735" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" fill="#374151">注：严格引用命中是保守下界；合理不作答要求官方不可回答、最终拒答、Analysis 支持拒答同时成立。</text>
  <text x="60" y="762" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" fill="#374151">解释：完整 ARPM 的证据入提示率为 83.28%，官方不可回答命中率为 93.95%；白盒合理不作答率为 46.64%，说明约一半拒答可在 Analysis 中找到明确证据不足依据。</text>
  <text x="60" y="790" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" fill="#374151">人工复核需逐题对齐官方答案、召回证据、Analysis 和 Response，特别检查可回答问题中的 IDK-like 输出是否为部分拒答或过度保守。</text>
