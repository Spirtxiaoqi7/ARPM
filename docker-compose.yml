services:
  arpm:
    build: .
    container_name: arpm-v4-1
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      DEBUG: "false"
      ARPM_RUNTIME_DIR: /app/runtime/arpm-app
      ARPM_MODEL_ROOT: /app/assets/models
    volumes:
      - ./runtime:/app/runtime
      - ./assets:/app/assets
    restart: unless-stopped
