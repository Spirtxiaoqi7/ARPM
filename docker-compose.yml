services:
  arpm-v4:
    build: .
    container_name: arpm-v4
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      DEBUG: "False"
      SECRET_KEY: "${SECRET_KEY:-change-me}"
      ARPM_RUNTIME_DIR: /app/runtime/arpm-app
      ARPM_MODEL_ROOT: /app/assets/models
    volumes:
      - ./runtime:/app/runtime
      - ./assets/models:/app/assets/models:ro
    restart: unless-stopped
