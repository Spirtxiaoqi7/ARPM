<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARPM 对话系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button id="new-chat" class="btn-new-chat">
                    <span>+</span>
                    新对话
                </button>
            </div>
            <div class="session-list" id="session-list"></div>
            <div class="sidebar-footer">
                <button id="open-settings" class="btn-settings">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.5.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.63c-.04.34-.07.67-.07 1 0 .33.03.66.07.97l-2.11 1.63c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.63Z"/></svg>
                    设置
                </button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main">
            <!-- 顶部标题栏 -->
            <header class="header">
                <div class="model-selector" id="model-display">
                    <span>ARPM 对话系统</span>
                </div>
            </header>

            <!-- 聊天区域 -->
            <div class="chat-container" id="chat-container">
                <div class="welcome" id="welcome">
                    <h1>ARPM 智能对话系统</h1>
                    <p>基于异步轮次管理与检索增强生成技术</p>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        id="user-input" 
                        placeholder="发送消息..." 
                        rows="1"
                    ></textarea>
                    <div class="input-actions">
                        <button id="btn-send" class="btn-send" disabled>
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M2 12a10 10 0 1 1 20 0 10 10 0 0 1-20 0Zm18 0a8 8 0 1 0-16 0 8 8 0 0 0 16 0Zm-4.7-2.3a1 1 0 0 1 0 1.4l-4 4a1 1 0 0 1-1.4 0l-2-2a1 1 0 0 1 1.4-1.4L11 12.58l3.3-3.3a1 1 0 0 1 1.4 0Z"/></svg>
                        </button>
                        <button id="btn-stop" class="btn-stop" style="display:none">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm4 11H8v-2h8Z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="input-footer">
                    <span id="status-text">就绪</span>
                    <span class="divider">·</span>
                    <span id="round-text">第 1 轮</span>
                </div>
            </div>
        </main>

        <!-- 右侧信息面板 -->
        <aside class="info-panel" id="info-panel">
            <div class="panel-section">
                <div class="panel-header">
                    <span>检索结果</span>
                    <span id="rag-count" class="count">0</span>
                </div>
                <div class="panel-content" id="rag-content">
                    <div class="empty">等待检索...</div>
                </div>
            </div>
            <div class="panel-section">
                <div class="panel-header">
                    <span>思维链重排序</span>
                </div>
                <div class="panel-content" id="cot-content">
                    <div class="empty">等待分析...</div>
                </div>
            </div>
        </aside>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>设置</h2>
                <button class="btn-close" id="close-settings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="config-section">
                    <h3>API 配置</h3>
                    <div class="form-item">
                        <label>API 密钥</label>
                        <input type="password" id="cfg-api-key" placeholder="sk-...">
                    </div>
                    <div class="form-item">
                        <label>接口地址</label>
                        <input type="text" id="cfg-base-url" placeholder="https://api.deepseek.com">
                    </div>
                    <div class="form-item">
                        <label>模型名称</label>
                        <input type="text" id="cfg-model" placeholder="deepseek-chat">
                    </div>
                    <button id="test-api" class="btn-secondary">测试连接</button>
                    <span id="test-result"></span>
                </div>

                <div class="config-section">
                    <h3>角色设定</h3>
                    <div class="form-item">
                        <label>系统提示词</label>
                        <textarea id="cfg-system-prompt" rows="3" placeholder="定义 AI 助手的行为和性格..."></textarea>
                    </div>
                </div>

                <div class="config-section">
                    <h3>知识库</h3>
                    <div class="file-upload">
                        <input type="file" id="file-upload" accept=".txt,.md,.json" style="display:none">
                        <button id="upload-file" class="btn-secondary">选择文件</button>
                        <span id="file-name"></span>
                    </div>
                    <div class="progress-container" id="progress-container" style="display:none">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        <span id="progress-text">0%</span>
                    </div>
                    <div class="knowledge-info">
                        已加载 <strong id="kb-count">0</strong> 个片段
                    </div>
                </div>

                <div class="config-section">
                    <h3>检索参数</h3>
                    <div class="form-row">
                        <div class="form-item">
                            <label>分块大小</label>
                            <input type="number" id="cfg-chunk-size" value="600" min="100" max="2000" step="100">
                        </div>
                        <div class="form-item">
                            <label>检索数量</label>
                            <input type="number" id="cfg-top-k" value="5" min="1" max="20">
                        </div>
                        <div class="form-item">
                            <label>衰减率</label>
                            <input type="number" id="cfg-decay" value="20" min="1" max="100">
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-settings" class="btn-primary">保存</button>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
